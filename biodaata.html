<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biodata</title>

  <style>
    /* =========================
   RESET & BASE TOKENS
========================= */
    @import url("https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css");
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap');

    :root {
      --primary-dark: #051630;
      --primary-green: #005640;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --font-heading: "Plus Jakarta Sans", sans-serif;
      --font-body: "Work Sans", sans-serif;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* =========================
   SIDEBAR
========================= */
    .sidebar {
      width: 260px;
      background-color: var(--primary-dark);
      color: white;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      padding: 0 12px;
    }

    .brand-icon {
      background: white;
      border-radius: 4px;
      padding: 6px;
      display: flex;
    }

    .brand-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--primary-dark);
    }

    .brand-text h2 {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 18px;
      line-height: 1.2;
    }

    .brand-text span {
      font-size: 10px;
      color: #9ca3af;
      font-weight: 500;
    }

    .nav-section {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding: 0 12px;
      text-transform: uppercase;
    }

    .nav-menu {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #d1d5db;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background-color: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .nav-item.active {
      background-color: #1e3a8a;
      /* active blue */
      color: white;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: transparent;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-body);
      margin-top: auto;
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* =========================
   MAIN CONTENT AREA
========================= */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* TOP HEADER */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: var(--bg-body);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-green);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .header-icons {
      display: flex;
      gap: 16px;
    }

    .header-icons svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      cursor: pointer;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: var(--primary-green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-main);
    }

    .user-role {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* PAGE CONTENT */
    .page-content {
      padding: 32px 40px;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* FORM CARD */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 32px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 16px;
      color: var(--primary-green);
      margin-bottom: 24px;
    }

    .section-title svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-main);
    }

    .input-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-container svg.left-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      stroke: #9ca3af;
      stroke-width: 2;
      fill: none;
    }

    .input-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: #ffffff;
      outline: none;
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--text-main);
    }

    .input-control:focus {
      border-color: var(--primary-green);
    }

    .input-container .input-control {
      padding-left: 40px;
      /* Space for icon */
    }

    .input-control::placeholder {
      color: #9ca3af;
    }

    select.input-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
      cursor: pointer;
    }

    textarea.input-control {
      resize: vertical;
      min-height: 100px;
    }

    /* Radio Buttons */
    .radio-group {
      display: flex;
      align-items: center;
      gap: 24px;
      height: 100%;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .radio-item input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-green);
      cursor: pointer;
    }

    .radio-item span {
      font-size: 14px;
      color: var(--text-main);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 32px 0;
    }

    /* Button Actions */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-heading);
      transition: all 0.2s;
    }

    .btn-outline {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-outline:hover {
      background: #f9fafb;
    }

    .btn-primary {
      background: var(--primary-green);
      color: white;
      border: 1px solid var(--primary-green);
    }

    .btn-primary:hover {
      background: #004532;
    }

    /* FOOTER */
    .dash-footer {
      display: flex;
      justify-content: space-between;
      padding: 24px 40px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-body);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: auto;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full-width {
        grid-column: span 1;
      }
    }
  /* Style khusus untuk input yang di-disabled agar terlihat jelas tidak bisa diubah */
input:disabled, select:disabled, textarea:disabled {
  background-color: #e2e8f0 !important;
  color: #64748b !important;
  cursor: not-allowed !important;
  border-color: #cbd5e1 !important;
  opacity: 0.85;
}
</style>
</head>

<script>
  checkSession();

  let isUpdate = false;
  const DRAFT_KEY = 'pmb_biodata_draft';

  async function loadBiodata() {
    // 1. Muat data pendaftaran (nama, NIK, wa, email) dari status seleksi API
    try {
      const statusRes = await apiFetch('/portal/status');
      if (statusRes.success && statusRes.data) {
        const user = statusRes.data;
        const fields = ['nama_lengkap', 'nik', 'nomor_wa', 'email'];
        fields.forEach(f => {
          const el = document.getElementById(f);
          if (el) el.value = user[f] || '';
        });
        
        // Render nama & initials di sidebar/header
        if (document.querySelector('.user-name') && user.nama_lengkap) {
          if (document.querySelector('.user-name').childNodes[0]) {
            document.querySelector('.user-name').childNodes[0].textContent = user.nama_lengkap + ' ';
          }
          const initials = user.nama_lengkap.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
          const avatar = document.querySelector('.avatar');
          if (avatar) avatar.textContent = initials;
        }
      }
    } catch (err) {
      console.error('Gagal mengambil status pendaftaran:', err);
    }

    // 2. Muat data biodata detail jika sudah pernah diisi di database
    try {
      const bioRes = await apiFetch('/biodata/biodata');
      if (bioRes.success && bioRes.data) {
        isUpdate = true;
        const data = bioRes.data;
        
        const fields = ['tempat_lahir', 'agama', 'alamat_lengkap', 'provinsi', 'kota_kabupaten', 'kecamatan', 'kode_pos'];
        fields.forEach(f => {
          const el = document.getElementById(f);
          if (el) el.value = data[f] || '';
        });
        
        const dateEl = document.getElementById('tanggal_lahir');
        if (dateEl && data.tanggal_lahir) {
          dateEl.value = data.tanggal_lahir.substring(0, 10);
        }
        
        if (data.jenis_kelamin) {
          const genderVal = data.jenis_kelamin === 'L' ? 'Laki-laki' : 'Perempuan';
          const radio = document.querySelector(`input[name="gender"][value="${genderVal}"]`);
          if (radio) radio.checked = true;
        }
      }
    } catch (err) {
      // Kita abaikan error 404 (atau data belum diisi) dan log error lainnya
      console.log('Biodata di database belum diisi atau tidak ditemukan (wajar untuk pendaftaran baru):', err);
    }

    // 3. Muat data draf lokal jika ada (menimpa/mengisi form jika belum disubmit ke DB atau untuk melanjutkan draf)
    const draftStr = localStorage.getItem(DRAFT_KEY);
    if (draftStr) {
      try {
        const draft = JSON.parse(draftStr);
        if (draft.tempat_lahir) document.getElementById('tempat_lahir').value = draft.tempat_lahir;
        if (draft.tanggal_lahir) document.getElementById('tanggal_lahir').value = draft.tanggal_lahir;
        if (draft.agama) document.getElementById('agama').value = draft.agama;
        if (draft.alamat_lengkap) document.getElementById('alamat_lengkap').value = draft.alamat_lengkap;
        if (draft.provinsi) document.getElementById('provinsi').value = draft.provinsi;
        if (draft.kota_kabupaten) document.getElementById('kota_kabupaten').value = draft.kota_kabupaten;
        if (draft.kecamatan) document.getElementById('kecamatan').value = draft.kecamatan;
        if (draft.kode_pos) document.getElementById('kode_pos').value = draft.kode_pos;
        
        if (draft.jenis_kelamin) {
          const genderVal = draft.jenis_kelamin === 'L' ? 'Laki-laki' : 'Perempuan';
          const radio = document.querySelector(`input[name="gender"][value="${genderVal}"]`);
          if (radio) radio.checked = true;
        }
      } catch (e) {
        console.error('Gagal memuat draf dari localStorage:', e);
      }
    }
  }

  function saveDraftLocal() {
    const getValue = (id) => {
      const el = document.getElementById(id);
      return el ? el.value : '';
    };

    const genderRadio = document.querySelector('input[name="gender"]:checked');
    const jenis_kelamin = genderRadio ? (genderRadio.value === 'Laki-laki' ? 'L' : 'P') : null;

    const draftData = {
      tempat_lahir: getValue('tempat_lahir').trim(),
      tanggal_lahir: getValue('tanggal_lahir'),
      agama: getValue('agama'),
      alamat_lengkap: getValue('alamat_lengkap').trim(),
      provinsi: getValue('provinsi'),
      kota_kabupaten: getValue('kota_kabupaten'),
      kecamatan: getValue('kecamatan'),
      kode_pos: getValue('kode_pos').trim(),
      jenis_kelamin: jenis_kelamin
    };

    localStorage.setItem(DRAFT_KEY, JSON.stringify(draftData));
    return true;
  }

  async function saveBiodata() {
    const getValue = (id) => {
      const el = document.getElementById(id);
      return el ? el.value : '';
    };

    const tempat_lahir = getValue('tempat_lahir').trim();
    const tanggal_lahir = getValue('tanggal_lahir');
    const agama = getValue('agama');
    const alamat_lengkap = getValue('alamat_lengkap').trim();
    const provinsi = getValue('provinsi');
    const kota_kabupaten = getValue('kota_kabupaten');
    const kecamatan = getValue('kecamatan');
    const kode_pos = getValue('kode_pos').trim();
    
    const genderRadio = document.querySelector('input[name="gender"]:checked');
    const jenis_kelamin = genderRadio ? (genderRadio.value === 'Laki-laki' ? 'L' : 'P') : null;

    if (!tempat_lahir || !tanggal_lahir || !jenis_kelamin || !agama || !alamat_lengkap || !provinsi || !kota_kabupaten || !kecamatan || !kode_pos) {
      alert('Semua kolom data pribadi, kontak dan alamat wajib diisi!');
      return false;
    }

    const payload = {
      tempat_lahir,
      tanggal_lahir,
      jenis_kelamin,
      agama,
      alamat_lengkap,
      provinsi,
      kota_kabupaten,
      kecamatan,
      kode_pos
    };

    try {
      const endpoint = '/biodata/biodata';
      const method = isUpdate ? 'PUT' : 'POST';

      await apiFetch(endpoint, {
        method,
        body: JSON.stringify(payload)
      });

      isUpdate = true;
      return true;
    } catch (err) {
      alert(err.message || 'Gagal menyimpan biodata.');
      return false;
    }
  }

  // Event handler untuk tombol Simpan & Lanjutkan
  document.getElementById('btn-submit-biodata').addEventListener('click', async (e) => {
    e.preventDefault();
    if (isUpdate) {
      alert('Anda sudah pernah mengisi biodata');
      window.location.href = 'formulir pendaftaran.html';
      return;
    }
    const success = await saveBiodata();
    if (success) {
      localStorage.removeItem(DRAFT_KEY); // Hapus draf lokal setelah berhasil disubmit ke database
      alert('Biodata berhasil tersimpan');
      window.location.href = 'formulir pendaftaran.html';
    }
  });

  // Event handler untuk tombol Simpan Draf
  document.getElementById('btn-draft-biodata').addEventListener('click', async (e) => {
    e.preventDefault();
    const success = saveDraftLocal();
    if (success) {
      alert('Draf biodata berhasil disimpan secara lokal di browser Anda!');
    }
  });

  // Load awal
  loadBiodata();
</script>
<script src="js/sidebar.js"></script>
</body>
