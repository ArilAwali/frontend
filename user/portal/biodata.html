<html lang="id">

<head>
  <script src="../../config/auth-guard.js"></script>
  <script src="../../config/api.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biodata</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #051630;
      --primary-green: #005640;
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
      --font-heading: "Plus Jakarta Sans", sans-serif;
      --font-body: "Work Sans", sans-serif;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      background-color: var(--bg-body);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* =========================
   SIDEBAR
========================= */
    /* =========================
   MAIN CONTENT AREA
========================= */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* TOP HEADER */
    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      background: var(--bg-body);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-green);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .header-icons {
      display: flex;
      gap: 16px;
    }

    .header-icons svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      stroke-width: 2;
      fill: none;
      cursor: pointer;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: var(--primary-green);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-main);
    }

    .user-role {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* PAGE CONTENT */
    .page-content {
      padding: 32px 40px;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* FORM CARD */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 32px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 16px;
      color: var(--primary-green);
      margin-bottom: 24px;
    }

    .section-title svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-main);
    }

    .input-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-container svg.left-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      stroke: #9ca3af;
      stroke-width: 2;
      fill: none;
    }

    .input-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: #ffffff;
      outline: none;
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--text-main);
    }

    .input-control:focus {
      border-color: var(--primary-green);
    }

    .input-container .input-control {
      padding-left: 40px;
      /* Space for icon */
    }

    .input-control::placeholder {
      color: #9ca3af;
    }

    select.input-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px;
      cursor: pointer;
    }

    textarea.input-control {
      resize: vertical;
      min-height: 100px;
    }

    .disabled-control {
      background: #f0f0f0;
      cursor: not-allowed;
    }

    /* Radio Buttons */
    .radio-group {
      display: flex;
      align-items: center;
      gap: 24px;
      height: 100%;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .radio-item input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-green);
      cursor: pointer;
    }

    .radio-item span {
      font-size: 14px;
      color: var(--text-main);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border-color);
      margin: 32px 0;
    }

    /* Button Actions */
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: var(--font-heading);
      transition: all 0.2s;
    }

    .btn-outline {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-outline:hover {
      background: #f9fafb;
    }

    .btn-primary {
      background: var(--primary-green);
      color: white;
      border: 1px solid var(--primary-green);
    }

    .btn-primary:hover {
      background: #004532;
    }

    /* FOOTER */
    .dash-footer {
      display: flex;
      justify-content: space-between;
      padding: 24px 40px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-body);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: auto;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-group.full-width {
        grid-column: span 1;
      }
    }
  </style>
  <link rel="stylesheet" href="../assets/css/sidebar.css">
</head>

<body>

  <aside class="sidebar"></aside>

  <div class="main-wrapper">

    <header class="top-header">
      <div class="header-title">Biodata</div>
      <div class="header-right">
        <div class="header-icons">
          <svg viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </div>
        <div class="user-profile">
          <div class="avatar">MD</div>
          <div class="user-info">
            <div class="user-name">Muhammad Dhafin</div>
            <div class="user-role">Mahasiswa</div>
          </div>
        </div>
      </div>
    </header>

    <main class="page-content">

      <div class="page-header">
        <h1>Lengkapi Biodata Anda</h1>
        <p>Pastikan data yang Anda masukkan benar dan sesuai dengan dokumen resmi.</p>
      </div>

      <form id="biodataForm" class="form-card">
        <div id="info_banner" style="display: none;"></div>

        <div class="section-title">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          Data Pribadi
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama_lengkap" class="input-control disabled-control"
              placeholder="Masukkan Nama Sesuai Ijazah" disabled>
          </div>

          <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" id="tanggal_lahir" class="input-control" required>
          </div>

          <div class="form-group">
            <label>Tempat Lahir</label>
            <input type="text" id="tempat_lahir" class="input-control" placeholder="Kota/Kabupaten" required>
          </div>

          <div class="form-group">
            <label>Nomor Induk Kependudukan (NIK)</label>
            <div class="input-container">
              <svg class="left-icon" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="10.5" r="2.5"></circle>
                <line x1="14" y1="9" x2="19" y2="9"></line>
                <line x1="14" y1="13" x2="19" y2="13"></line>
                <line x1="5" y1="17" x2="19" y2="17"></line>
              </svg>
              <input type="text" id="nik" class="input-control disabled-control" placeholder="16 digit NIK" disabled>
            </div>
          </div>

          <div class="form-group">
            <label>Agama</label>
            <select id="agama" class="input-control" required>
              <option value="" disabled selected>Pilih Agama</option>
              <option value="islam">Islam</option>
              <option value="kristen">Kristen Protestan</option>
              <option value="katolik">Katolik</option>
              <option value="hindu">Hindu</option>
              <option value="buddha">Buddha</option>
              <option value="konghucu">Konghucu</option>
            </select>
          </div>

          <div class="form-group">
            <label>Jenis Kelamin</label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="gender" value="L" required>
                <span>Laki-laki</span>
              </label>
              <label class="radio-item">
                <input type="radio" name="gender" value="P" required>
                <span>Perempuan</span>
              </label>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section-title">
          <svg viewBox="0 0 24 24">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          Kontak & Alamat
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nomor WhatsApp Aktif</label>
            <div class="input-container">
              <svg class="left-icon" viewBox="0 0 24 24">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                </path>
              </svg>
              <input type="text" id="nomor_wa" class="input-control disabled-control" placeholder="08xxxxxxxx" disabled>
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <div class="input-container">
              <svg class="left-icon" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <input type="email" id="email" class="input-control disabled-control" placeholder="contoh@email.com"
                disabled>
            </div>
          </div>

          <div class="form-group full-width">
            <label>Alamat Lengkap</label>
            <textarea id="alamat_lengkap" class="input-control" placeholder="Masukkan alamat lengkap sesuai KTP"
              required></textarea>
          </div>

          <div class="form-group">
            <label>Provinsi</label>
            <select id="provinsi" class="input-control" required>
              <option value="" disabled selected>Pilih Provinsi</option>
              <option value="Jawa Barat">Jawa Barat</option>
              <option value="DKI Jakarta">DKI Jakarta</option>
              <option value="Jawa Tengah">Jawa Tengah</option>
            </select>

          <div class="form-group">
            <label>Kota/Kabupaten</label>
            <select id="kota_kabupaten" class="input-control" required>
              <option value="" disabled selected>Pilih Kota/Kabupaten</option>
              <option value="Kota Bandung">Kota Bandung</option>
              <option value="Kab. Tasikmalaya">Kab. Tasikmalaya</option>
            </select>
          </div>

          <div class="form-group">
            <label>Kecamatan</label>
            <select id="kecamatan" class="input-control" required>
              <option value="" disabled selected>Pilih Kecamatan</option>
              <option value="Cibeureum">Cibeureum</option>
              <option value="Tawang">Tawang</option>
            </select>
          </div>

          <div class="form-group">
            <label>Kode Pos</label>
            <input type="number" id="kode_pos" class="input-control" placeholder="5 Digit Kode Pos" required>
          </div>
        </div>

        <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
          <button type="button" id="btn_simpan_draf" class="btn btn-outline"
            style="padding: 12px 24px; border: 1px solid var(--border-color); border-radius: 8px; font-weight: 600; cursor: pointer; background: white;">Simpan
            Draf</button>
          <button type="submit" class="btn btn-primary">Kirim & Lanjutkan</button>
        </div>

      </form>

    </main>

    <footer class="dash-footer">
      <div>© 2025 Universitas Crypto. Semua hak dilindungi.</div>
      <div class="footer-links">
        <a href="#">Bantuan</a>
        <a href="#">Syarat & Ketentuan</a>
        <a href="#">Kebijakan Privasi</a>
      </div>
    </footer>

  </div>

  <script src="../assets/js/sidebar.js"></script>
  <script>
    let isEditMode = false;

    // Fungsi utility untuk me-nonaktifkan seluruh form kontrol & memberikan style khusus
    function disableAllInputs() {
      const selectors = [
        '#tempat_lahir',
        '#tanggal_lahir',
        '#agama',
        'input[name="gender"]',
        '#alamat_lengkap',
        '#provinsi',
        '#kota_kabupaten',
        '#kecamatan',
        '#kode_pos'
      ];
      selectors.forEach(sel => {
        const elements = document.querySelectorAll(sel);
        elements.forEach(el => {
          el.disabled = true;
          el.classList.add('disabled-control');
        });
      });
    }

    // Load Data Akun & Biodata saat pertama kali masuk halaman
    async function loadData() {
      try {
        // 1. Ambil info akun untuk populate field read-only
        const accountData = await fetchAPI('/portal/status');
        if (accountData.success) {
          document.getElementById('nama_lengkap').value = accountData.data.nama_lengkap || '';
          document.getElementById('nik').value = accountData.data.nik || '';
          document.getElementById('nomor_wa').value = accountData.data.nomor_wa || '';
          document.getElementById('email').value = accountData.data.email || '';
        }

        // 2. Ambil biodata resmi jika sudah pernah diisi ke database
        const biodataResponse = await fetchAPI('/biodata/biodata');
        if (biodataResponse.success && biodataResponse.data) {
          isEditMode = true;
          const bio = biodataResponse.data;

          document.getElementById('tempat_lahir').value = bio.tempat_lahir || '';
          if (bio.tanggal_lahir) {
            // Potong format ISO timestamp jika ada, ambil YYYY-MM-DD
            document.getElementById('tanggal_lahir').value = bio.tanggal_lahir.split('T')[0];
          }

          if (bio.agama) {
            document.getElementById('agama').value = bio.agama;
          }

          if (bio.jenis_kelamin) {
            const genderRadio = document.querySelector(`input[name="gender"][value="${bio.jenis_kelamin}"]`);
            if (genderRadio) genderRadio.checked = true;
          }

          document.getElementById('alamat_lengkap').value = bio.alamat_lengkap || '';

          if (bio.provinsi) document.getElementById('provinsi').value = bio.provinsi;
          if (bio.kota_kabupaten) document.getElementById('kota_kabupaten').value = bio.kota_kabupaten;
          if (bio.kecamatan) document.getElementById('kecamatan').value = bio.kecamatan;

          document.getElementById('kode_pos').value = bio.kode_pos || '';

          // Hapus draf karena data resmi sudah terdaftar
          localStorage.removeItem('biodata_draft');

          // TAMPILAN LOCK & BANNER (Ketika Biodata Sudah Terkirim)
          // 1. Tampilkan banner info di atas form
          const banner = document.getElementById('info_banner');
          if (banner) {
            banner.style.display = 'block';
            banner.innerHTML = `
              <div style="background-color: #e0f2fe; border: 1px solid #bae6fd; border-radius: 8px; padding: 16px; margin-bottom: 24px; display: flex; align-items: flex-start; gap: 12px; color: #0369a1;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0; margin-top: 2px;">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></svg>
                </svg>
                <div>
                  <h5 style="margin: 0 0 4px 0; font-weight: 700; font-size: 14px;">Informasi Pengiriman</h5>
                  <p style="margin: 0; font-size: 13px; line-height: 1.4;">Anda telah mengirimkan biodata pendaftaran. Semua data di bawah ini telah dikunci dan tidak dapat diubah kembali.</p>
                </div>
              </div>
            `;
          }

          // 2. Ganti tombol Simpan Draf & Simpan Lanjutkan menjadi tombol Navigasi saja
          const actions = document.querySelector('.form-actions');
          if (actions) {
            actions.innerHTML = `
              <button type="button" class="btn btn-primary" onclick="window.location.href='formulir.html'" style="padding: 12px 24px; background: var(--primary-green); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                Lanjutkan ke Formulir
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            `;
          }

          // 3. Kunci seluruh input dan beri style khusus disabled
          disableAllInputs();
        } else {
          // 3. Jika data resmi tidak ada, cek draf di browser
          const draftStr = localStorage.getItem('biodata_draft');
          if (draftStr) {
            const draft = JSON.parse(draftStr);

            if (draft.tempat_lahir) document.getElementById('tempat_lahir').value = draft.tempat_lahir;
            if (draft.tanggal_lahir) document.getElementById('tanggal_lahir').value = draft.tanggal_lahir;
            if (draft.agama) document.getElementById('agama').value = draft.agama;

            if (draft.jenis_kelamin) {
              const genderRadio = document.querySelector(`input[name="gender"][value="${draft.jenis_kelamin}"]`);
              if (genderRadio) genderRadio.checked = true;
            }

            if (draft.alamat_lengkap) document.getElementById('alamat_lengkap').value = draft.alamat_lengkap;
            if (draft.provinsi) document.getElementById('provinsi').value = draft.provinsi;
            if (draft.kota_kabupaten) document.getElementById('kota_kabupaten').value = draft.kota_kabupaten;
            if (draft.kecamatan) document.getElementById('kecamatan').value = draft.kecamatan;
            if (draft.kode_pos) document.getElementById('kode_pos').value = draft.kode_pos;
          }
        }
      } catch (error) {
        console.error('Error saat meload data biodata:', error);
      }
    }

    // Event handler untuk tombol Simpan Draf
    const drafBtn = document.getElementById('btn_simpan_draf');
    if (drafBtn) {
      drafBtn.addEventListener('click', () => {
        // Draf boleh disimpan tanpa harus mengisi semua kolom wajib
        const genderInput = document.querySelector('input[name="gender"]:checked');
        const draftData = {
          tempat_lahir: document.getElementById('tempat_lahir').value,
          tanggal_lahir: document.getElementById('tanggal_lahir').value,
          jenis_kelamin: genderInput ? genderInput.value : '',
          agama: document.getElementById('agama').value,
          alamat_lengkap: document.getElementById('alamat_lengkap').value,
          provinsi: document.getElementById('provinsi').value,
          kota_kabupaten: document.getElementById('kota_kabupaten').value,
          kecamatan: document.getElementById('kecamatan').value,
          kode_pos: document.getElementById('kode_pos').value
        };

        localStorage.setItem('biodata_draft', JSON.stringify(draftData));
        alert('Biodata berhasil disimpan sementara, jika format dirasa sudah benar silahkan klik tombol Simpan dan Lanjutkan');
      });
    }

    // Submit Handler untuk Biodata Form
    document.getElementById('biodataForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Jika user sudah pernah mengirimkan biodata sebelumnya, blokir submit ulang
      if (isEditMode) {
        alert('Anda sudah pernah mengirimkan biodata');
        window.location.href = 'formulir.html';
        return;
      }

      const genderInput = document.querySelector('input[name="gender"]:checked');
      if (!genderInput) {
        alert('Silakan pilih jenis kelamin Anda!');
        return;
      }

      const payload = {
        tempat_lahir: document.getElementById('tempat_lahir').value,
        tanggal_lahir: document.getElementById('tanggal_lahir').value,
        jenis_kelamin: genderInput.value,
        agama: document.getElementById('agama').value,
        alamat_lengkap: document.getElementById('alamat_lengkap').value,
        provinsi: document.getElementById('provinsi').value,
        kota_kabupaten: document.getElementById('kota_kabupaten').value,
        kecamatan: document.getElementById('kecamatan').value,
        kode_pos: document.getElementById('kode_pos').value
      };

      try {
        const response = await fetchAPI('/biodata/biodata', {
          method: 'POST', // Selalu POST untuk pengiriman pertama kali
          body: JSON.stringify(payload)
        });

        alert('Biodata anda berhasil dikirim');
        localStorage.removeItem('biodata_draft'); // Hapus draf karena sudah sukses kirim resmi
        window.location.href = 'formulir.html'; // Pindah ke halaman berikutnya
      } catch (error) {
        alert('Gagal menyimpan biodata: ' + error.message);
      }
    });

    // Jalankan load data saat halaman siap
    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>

</html>
