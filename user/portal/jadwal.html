<!DOCTYPE html>
<html lang="id">
<head>
  <script src="../../config/auth-guard.js"></script>
  <script src="../../config/api.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Kuliah - Universitas Crypto</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Shared Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background-color: #FAFAFA; color: #333; min-height: 100vh; }
        /* Main Content */
        .main-content { flex: 1; padding: 0 40px 40px 40px; display: flex; flex-direction: column; }
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #EAEAEA; margin-bottom: 30px; }
        .topbar-title { font-size: 14px; font-weight: 600; color: #111827; }
        .topbar-right { display: flex; align-items: center; gap: 20px; }
        .topbar-icons { display: flex; gap: 20px; color: #666; font-size: 18px; }
        .profile { display: flex; align-items: center; gap: 12px; }
        .profile-avatar { width: 36px; height: 36px; background-color: #0A369D; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .profile-info { display: flex; flex-direction: column; }
        .profile-info .name { font-size: 14px; font-weight: 600; color: #111; }
        .profile-info .role { font-size: 12px; color: #777; }
        /* Page Header */
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .page-title h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 6px; }
        .page-title p { font-size: 14px; color: #6B7280; }
        .btn-download { background-color: #6B82A4; color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        /* Schedule Calendar Area */
        .schedule-wrapper { background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 12px; overflow: hidden; }
        .schedule-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .schedule-table th { background: #FFFFFF; padding: 16px; font-size: 13px; font-weight: 600; color: #111827; border-bottom: 1px solid #E5E7EB; border-right: 1px solid #E5E7EB; text-align: center; }
        .schedule-table th:first-child { width: 80px; color: #6B7280; font-size: 11px; text-transform: uppercase; }
        .schedule-table th:last-child { border-right: none; }
        .schedule-table td { height: 80px; /* 1 Jam = 80px */ border-bottom: 1px solid #E5E7EB; border-right: 1px dashed #E5E7EB; position: relative; padding: 0; }
        .schedule-table td:first-child { border-right: 1px solid #E5E7EB; text-align: center; font-size: 13px; font-weight: 500; color: #6B7280; position: relative; z-index: 10; background: #fff; }
        .schedule-table td:last-child { border-right: none; }
        /* Course Cards (Absolute Pos) */
        .course-card { position: absolute; left: 8px; right: 8px; border-radius: 8px; padding: 12px; z-index: 5; display: flex; flex-direction: column; gap: 6px; border: 1px solid rgba(0,0,0,0.05); }
        .cc-title { font-size: 12px; font-weight: 600; color: #111827; line-height: 1.3; }
        .cc-detail { font-size: 11px; color: #4B5563; display: flex; align-items: center; gap: 4px; }
        /* Specific Card Colors */
        .bg-green { background-color: #DCFCE7; }
        .bg-blue { background-color: #E0F2FE; }
        .bg-gray { background-color: #F3F4F6; }
        /* Footer */
        .site-footer { display: flex; justify-content: space-between; padding-top: 30px; font-size: 12px; color: #9CA3AF; margin-top: auto; }
        .footer-links { display: flex; gap: 16px; }
        .footer-links a { color: #6B7280; text-decoration: none; }
    </style>
    <link rel="stylesheet" href="../assets/css/sidebar.css">
</head>
<body>

    <aside class="sidebar"></aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-title">Portal Mahasiswa</div>
            <div class="topbar-right">
                <div class="topbar-icons">
                    <i class="far fa-bell"></i>
                    <i class="far fa-envelope"></i>
                </div>
                <div class="profile">
                    <div class="profile-avatar" id="profileAvatar">-</div>
                    <div class="profile-info">
                        <span class="name" id="profileName">-</span>
                        <span class="role">Mahasiswa</span>
                    </div>
                    <i class="fas fa-chevron-down" style="font-size: 12px; color: #777;"></i>
                </div>
            </div>
        </header>

        <div class="page-header">
            <div class="page-title">
                <h1>Jadwal Kuliah</h1>
                <p id="academicYear">Semester Ganjil 2026/2027</p>
            </div>
            <button class="btn-download" onclick="window.print()">
                <i class="fas fa-file-download"></i> Cetak Jadwal
            </button>
        </div>

        <div class="schedule-wrapper" id="scheduleGridContainer">
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>WAKTU</th>
                        <th>Senin</th>
                        <th>Selasa</th>
                        <th>Rabu</th>
                        <th>Kamis</th>
                        <th>Jumat</th>
                    </tr>
                </thead>
                <tbody id="scheduleTableBody">
                    <tr><td>08:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>09:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>10:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>11:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>12:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>13:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>14:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                    <tr><td>15:00</td><td></td><td></td><td></td><td></td><td></td></tr>
                </tbody>
            </table>
        </div>

        <footer class="site-footer">
            <div>&copy; 2026 Universitas Crypto. Semua hak dilindungi.</div>
            <div class="footer-links">
                <a href="#">Bantuan</a>
                <a href="#">Syarat & Ketentuan</a>
                <a href="#">Kebijakan Privasi</a>
            </div>
        </footer>
    </main>
    <script src="../assets/js/sidebar.js"></script>
    <script>
        const daysMap = {
            'senin': 1,
            'selasa': 2,
            'rabu': 3,
            'kamis': 4,
            'jumat': 5
        };

        const hoursMap = {
            '08:00': 0,
            '09:00': 1,
            '10:00': 2,
            '11:00': 3,
            '12:00': 4,
            '13:00': 5,
            '14:00': 6,
            '15:00': 7
        };

        function parseTime(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h + m / 60;
        }

        async function initJadwal() {
            try {
                // 1. Fetch User Profile status
                const statusRes = await fetchAPI('/portal/status');
                if (statusRes.success) {
                    const user = statusRes.data;
                    document.getElementById('profileName').textContent = user.nama_lengkap;
                    
                    const initials = user.nama_lengkap.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                    document.getElementById('profileAvatar').textContent = initials;
                    
                    const roleEl = document.querySelector('.profile-info .role');
                    if (roleEl) {
                        roleEl.textContent = user.nim ? `MHS - NIM: ${user.nim}` : 'PENDAFTAR';
                    }
                }

                // Hapus warning penolakan/belum disetujui jika ada sebelumnya
                const oldAlert = document.getElementById('krsAlertMsg');
                if (oldAlert) oldAlert.remove();

                // 2. Fetch KRS details
                const krsRes = await fetchAPI('/akademik/krs');
                const tbody = document.getElementById('scheduleTableBody');
                const rows = tbody.querySelectorAll('tr');

                // Clear cell contents first
                rows.forEach(row => {
                    const cells = row.querySelectorAll('td');
                    for (let i = 1; i < cells.length; i++) {
                        cells[i].innerHTML = '';
                    }
                });

                if (krsRes.success && Array.isArray(krsRes.data) && krsRes.data.length > 0) {
                    const firstKrs = krsRes.data[0];
                    const krsStatus = firstKrs.status_persetujuan;

                    if (krsStatus === 'disetujui') {
                        // Plot classes to grid
                        krsRes.data.forEach(c => {
                            const dayIdx = daysMap[c.hari.toLowerCase()];
                            if (dayIdx === undefined) return;

                            const [startStr, endStr] = c.jam.split(' - ');
                            const startHourStr = startStr.substring(0, 5);
                            const startHour = startHourStr.split(':')[0];
                            const rowIdx = hoursMap[startHour + ':00'];

                            if (rowIdx === undefined) return;

                            const startDecimal = parseTime(startHourStr);
                            const endDecimal = parseTime(endStr.substring(0, 5));
                            const duration = endDecimal - startDecimal;

                            const rowStartHour = parseInt(startHour, 10);
                            const offsetMinutes = (startDecimal - rowStartHour) * 60;
                            const topOffset = Math.round(offsetMinutes * (80 / 60));
                            const cardHeight = Math.round(duration * 80) - 10;

                            const targetRow = rows[rowIdx];
                            const targetCell = targetRow.querySelectorAll('td')[dayIdx];

                            const colors = ['bg-green', 'bg-blue', 'bg-gray'];
                            const colorClass = colors[c.kode_matakuliah.charCodeAt(c.kode_matakuliah.length - 1) % colors.length];

                            const card = document.createElement('div');
                            card.className = `course-card ${colorClass}`;
                            card.style.top = `${topOffset}px`;
                            card.style.height = `${cardHeight}px`;
                            card.innerHTML = `
                                <div class="cc-title">${c.nama_matakuliah}</div>
                                <div class="cc-detail"><i class="fas fa-map-marker-alt"></i> ${c.ruangan || 'Lantai 1'}</div>
                                <div class="cc-detail"><i class="far fa-user"></i> ${c.dosen || '-'}</div>
                                <div class="cc-detail"><i class="far fa-clock"></i> ${c.jam}</div>
                            `;
                            targetCell.appendChild(card);
                        });
                    } else {
                        // Status pending / proses / ditolak
                        const alertDiv = document.createElement('div');
                        alertDiv.id = 'krsAlertMsg';
                        alertDiv.style.backgroundColor = '#FEF3C7';
                        alertDiv.style.border = '1px solid #FCD34D';
                        alertDiv.style.color = '#92400E';
                        alertDiv.style.padding = '16px';
                        alertDiv.style.borderRadius = '8px';
                        alertDiv.style.marginBottom = '24px';
                        alertDiv.style.fontSize = '14px';
                        alertDiv.innerHTML = `
                            <i class="fas fa-exclamation-triangle" style="margin-right: 8px;"></i>
                            <strong>Jadwal Kuliah Belum Aktif:</strong> KRS Anda saat ini berstatus <strong>"${krsStatus === 'proses' ? 'Menunggu Verifikasi' : 'Ditolak/Belum Diajukan'}"</strong>. Jadwal kuliah akan ditampilkan setelah KRS Anda disetujui oleh akademik.
                        `;
                        const mainContent = document.querySelector('.main-content');
                        const pageHeader = document.querySelector('.page-header');
                        mainContent.insertBefore(alertDiv, pageHeader.nextElementSibling);
                    }
                } else {
                    // Belum diajukan
                    const alertDiv = document.createElement('div');
                    alertDiv.id = 'krsAlertMsg';
                    alertDiv.style.backgroundColor = '#EFF6FF';
                    alertDiv.style.border = '1px solid #BFDBFE';
                    alertDiv.style.color = '#1E40AF';
                    alertDiv.style.padding = '16px';
                    alertDiv.style.borderRadius = '8px';
                    alertDiv.style.marginBottom = '24px';
                    alertDiv.style.fontSize = '14px';
                    alertDiv.innerHTML = `
                        <i class="fas fa-info-circle" style="margin-right: 8px;"></i>
                        <strong>KRS Belum Diajukan:</strong> Anda belum memprogram mata kuliah untuk semester ini. Silakan kunjungi halaman <a href="krs.html" style="font-weight: 600; text-decoration: underline; color: #1D4ED8;">Kartu Rencana Studi (KRS)</a> untuk memilih mata kuliah.
                    `;
                    const mainContent = document.querySelector('.main-content');
                    const pageHeader = document.querySelector('.page-header');
                    mainContent.insertBefore(alertDiv, pageHeader.nextElementSibling);
                }

            } catch (error) {
                console.error('Error init jadwal:', error);
            }
        }

        window.addEventListener('DOMContentLoaded', initJadwal);
    </script>
</body>
</html>
